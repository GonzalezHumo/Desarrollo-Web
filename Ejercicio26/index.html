<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gonzalez Humo-Ejercicio 26</title>
  <style>
    body {
      background-color: #f9f0fb;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      margin: 0;
    }

    h1 {
      color: #9b5da0;
      font-size: 1.4rem;
      font-weight: normal;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .controles {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 30px;
    }

    label {
      color: #6a3d7a;
      font-size: 1rem;
    }

    input[type="number"] {
      width: 80px;
      padding: 8px 10px;
      border: 2px solid #e8b4da;
      border-radius: 10px;
      font-size: 1rem;
      font-family: Georgia, serif;
      color: #6a3d7a;
      background-color: #fdf3fc;
      outline: none;
      text-align: center;
    }

    input[type="number"]:focus {
      border-color: #c97ebe;
    }

    button {
      background-color: #e8b4da;
      color: #6a3d7a;
      border: 2px solid #d89cca;
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 1rem;
      font-family: Georgia, serif;
      cursor: pointer;
    }

    button:hover {
      background-color: #d89cca;
    }

    #mensaje {
      color: #b04070;
      font-size: 0.95rem;
      margin-bottom: 16px;
      min-height: 20px;
    }

    #contenedor {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .tabla {
      background-color: #fde8f5;
      border: 2px solid #e8b4da;
      border-radius: 14px;
      padding: 20px 28px;
      min-width: 160px;
      box-shadow: 0 4px 10px rgba(200, 150, 200, 0.2);
    }

    .tabla h2 {
      color: #9b5da0;
      font-size: 1rem;
      margin: 0 0 10px 0;
      text-align: center;
      border-bottom: 1px solid #e8b4da;
      padding-bottom: 6px;
    }

    .tabla p {
      color: #6a3d7a;
      margin: 4px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <h1>Tablas de Multiplicar</h1>

  <div class="controles">
    <label for="numero">Hasta la tabla del:</label>
    <input type="number" id="numero" min="1" placeholder="ej. 5">
    <button onclick="generarTablas()">Generar Tablas</button>
  </div>

  <p id="mensaje"></p>
  <div id="contenedor"></div>

  <script>
    function generarTablas() {
      const input     = document.getElementById("numero");
      const mensaje   = document.getElementById("mensaje");
      const contenedor = document.getElementById("contenedor");

      const valor = input.value.trim();
      const numero = parseInt(valor);

      contenedor.innerHTML = "";
      mensaje.textContent  = "";

      // Validaciones
      if (valor === "" || isNaN(numero)) {
        mensaje.textContent = "Por favor ingresa un número.";
        return;
      }

      if (numero <= 0 || !Number.isInteger(numero)) {
        mensaje.textContent = "El número debe ser entero y positivo.";
        return;
      }

      // Generar tablas del 1 al número ingresado
      for (let i = 1; i <= numero; i++) {
        const div = document.createElement("div");
        div.classList.add("tabla");

        const titulo = document.createElement("h2");
        titulo.textContent = "Tabla del " + i;
        div.appendChild(titulo);

        for (let j = 1; j <= 10; j++) {
          const p = document.createElement("p");
          p.textContent = i + " × " + j + " = " + (i * j);
          div.appendChild(p);
        }

        contenedor.appendChild(div);
      }
    }
  </script>

</body>
</html>
