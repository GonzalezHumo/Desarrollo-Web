<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gonzalez Humo-Ejercicio 22</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f7f5f2;
      --border: #e8e2db;
      --accent:  #a8d8b9;
      --accent2: #f7c5a0;
      --accent3: #c5b8f0;
      --accent4: #a8d4f0;
      --accent-dk:  #5aaa7a;
      --accent2-dk: #d4804a;
      --accent3-dk: #7a60c8;
      --accent4-dk: #4a9cc8;
      --text: #2d2a26;
      --muted: #9e9890;
      --card-bg: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(168,216,185,.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,216,185,.18) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 60px 24px 80px;
      position: relative;
      z-index: 1;
    }
    .header { text-align: center; margin-bottom: 48px; animation: fadeDown .8s ease both; }
    .header .tag {
      display: inline-block;
      font-size: .7rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--accent-dk); border: 1.5px solid var(--accent);
      background: #fff; padding: 4px 16px; border-radius: 999px; margin-bottom: 18px;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 5vw, 3rem);
      font-weight: 800; line-height: 1.15;
    }
    .header h1 span { color: var(--accent-dk); }
    .header p { margin-top: 10px; color: var(--muted); font-size: .85rem; line-height: 1.8; }
    .formula-card {
      background: var(--card-bg); border: 1.5px solid var(--border);
      border-radius: 18px; padding: 28px 32px; margin-bottom: 28px;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.05);
      animation: fadeUp .7s .15s ease both; text-align: center;
    }
    .formula-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--accent3), var(--accent), var(--accent2));
    }
    .formula-card h2 {
      font-size: .78rem; text-transform: uppercase; letter-spacing: .14em;
      color: var(--muted); margin-bottom: 20px;
    }
    .formulas-row { display: flex; justify-content: center; gap: 48px; flex-wrap: wrap; }
    .formula-item { text-align: center; }
    .formula-item .f-label {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; color: var(--muted); margin-bottom: 8px;
    }
    .formula-box {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 14px 24px; display: inline-block;
    }
    .f-numerator {
      font-size: 1rem; font-weight: 700; padding-bottom: 6px;
      border-bottom: 2px solid var(--text);
      display: flex; align-items: center; gap: 6px; justify-content: center;
    }
    .f-denominator { font-size: 1rem; font-weight: 700; padding-top: 6px; }
    .f-sqrt {
      display: inline-flex; align-items: center;
      border-top: 2px solid var(--text);
      padding: 2px 4px; margin-left: 2px;
    }
    .x1-color { color: var(--accent3-dk); }
    .x2-color { color: var(--accent-dk); }
    .form-card {
      background: var(--card-bg); border: 1.5px solid var(--border);
      border-radius: 18px; padding: 32px; margin-bottom: 28px;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.05);
      animation: fadeUp .7s .25s ease both;
    }
    .form-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent3), var(--accent2));
    }
    .form-card h2 {
      font-size: .82rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--muted); margin-bottom: 24px;
    }
    .inputs-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 28px; }
    @media (max-width: 520px) { .inputs-row { grid-template-columns: 1fr; } }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--muted);
    }
    .input-group .var-hint { font-size: .68rem; color: var(--muted); margin-top: -4px; }
    .input-group input {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.4rem; font-weight: 800; color: var(--text);
      text-align: center; outline: none;
      transition: border-color .2s, box-shadow .2s; width: 100%;
    }
    .input-group input:focus {
      border-color: var(--accent3);
      box-shadow: 0 0 0 3px rgba(197,184,240,.3);
    }
    .input-group input::placeholder { color: #ccc; font-size: 1rem; font-weight: 400; }
    .calc-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      color: #fff; border: none; border-radius: 12px; padding: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem; font-weight: 800;
      cursor: pointer; transition: transform .15s, opacity .15s, box-shadow .15s;
      letter-spacing: .04em;
    }
    .calc-btn:hover { transform: translateY(-2px); opacity: .92; box-shadow: 0 8px 20px rgba(197,184,240,.4); }
    .calc-btn:active { transform: translateY(0); }
    .result-card {
      background: var(--card-bg); border: 1.5px solid var(--border);
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.05);
      animation: fadeUp .7s .35s ease both; display: none;
    }
    .result-card.visible { display: block; }
    .result-card .rc-header {
      background: #f4f2ef; padding: 14px 24px;
      border-bottom: 1.5px solid var(--border);
      font-size: .72rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .12em;
    }
    .result-card .rc-body { padding: 28px 32px; }
    .results-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 480px) { .results-row { grid-template-columns: 1fr; } }
    .res-box { border-radius: 14px; padding: 20px 24px; text-align: center; }
    .res-box .rb-label {
      font-size: .72rem; text-transform: uppercase;
      letter-spacing: .12em; margin-bottom: 8px; font-weight: 700;
    }
    .res-box .rb-value { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 800; }
    .res-box.x1 { background: #f0ebff; }
    .res-box.x1 .rb-label { color: var(--accent3-dk); }
    .res-box.x1 .rb-value { color: var(--accent3-dk); }
    .res-box.x2 { background: #edf9f4; }
    .res-box.x2 .rb-label { color: var(--accent-dk); }
    .res-box.x2 .rb-value { color: var(--accent-dk); }
    .alert-msg {
      background: #fff4f4; border: 1.5px solid #f0c0c0;
      border-radius: 12px; padding: 14px 20px;
      color: #a04040; font-size: .82rem; font-weight: 600;
      margin-bottom: 20px; display: none;
    }
    .alert-msg.visible { display: block; animation: fadeIn .3s ease; }
    .output-msg {
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 18px 22px;
      font-size: .85rem; line-height: 2; color: #555;
    }
    .output-msg strong { font-weight: 800; }
    .footer {
      text-align: center; margin-top: 60px; color: var(--muted);
      font-size: .72rem; line-height: 2; animation: fadeUp .7s .4s ease both;
    }
    .footer span { color: var(--accent-dk); }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:none; } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:none; } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes popIn    { from { opacity:0; transform:scale(.85); } to { opacity:1; transform:scale(1); } }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Calculadora de la<br><span>Fórmula General</span></h1>
    <p>Ingresa los coeficientes a, b y c para obtener x₁ y x₂.</p>
  </div>

  <div class="formula-card">
    <h2>Fórmula utilizada</h2>
    <div class="formulas-row">
      <div class="formula-item">
        <div class="f-label x1-color">x₁</div>
        <div class="formula-box">
          <div class="f-numerator">
            −b − <span class="f-sqrt">b² − 4ac</span>
          </div>
          <div class="f-denominator">2a</div>
        </div>
      </div>
      <div class="formula-item">
        <div class="f-label x2-color">x₂</div>
        <div class="formula-box">
          <div class="f-numerator">
            −b + <span class="f-sqrt">b² − 4ac</span>
          </div>
          <div class="f-denominator">2a</div>
        </div>
      </div>
    </div>
  </div>

  <div class="form-card">
    <h2>Ingresa los coeficientes</h2>
    <div class="inputs-row">
      <div class="input-group">
        <label>Coeficiente A</label>
        <span class="var-hint">ax²</span>
        <input type="number" id="valA" placeholder="ej. 1" />
      </div>
      <div class="input-group">
        <label>Coeficiente B</label>
        <span class="var-hint">bx</span>
        <input type="number" id="valB" placeholder="ej. -3" />
      </div>
      <div class="input-group">
        <label>Coeficiente C</label>
        <span class="var-hint">c</span>
        <input type="number" id="valC" placeholder="ej. 2" />
      </div>
    </div>
    <button class="calc-btn" onclick="calcular()">
      Calcular x₁ y x₂
    </button>
  </div>

  <div class="alert-msg" id="alert-msg"></div>

  <div class="result-card" id="result-card">
    <div class="rc-header">Resultados</div>
    <div class="rc-body">
      <div class="results-row">
        <div class="res-box x1">
          <div class="rb-label">x₁</div>
          <div class="rb-value" id="val-x1">—</div>
        </div>
        <div class="res-box x2">
          <div class="rb-label">x₂</div>
          <div class="rb-value" id="val-x2">—</div>
        </div>
      </div>
      <div class="output-msg" id="output-msg"></div>
    </div>
  </div>

  <div class="footer">
    <span>JavaScript · Fórmula General</span><br>
    Victoria Marbella González Humo · Los Mochis, Sinaloa · 2026
  </div>

</div>
<script>
  function calcular() {
    document.getElementById('result-card').classList.remove('visible');
    document.getElementById('alert-msg').classList.remove('visible');

    const a = parseFloat(document.getElementById('valA').value);
    const b = parseFloat(document.getElementById('valB').value);
    const c = parseFloat(document.getElementById('valC').value);

    if (isNaN(a) || isNaN(b) || isNaN(c)) {
      const msg = document.getElementById('alert-msg');
      msg.textContent = 'Por favor ingresa valores en los tres campos (a, b y c).';
      msg.classList.add('visible');
      return;
    }

    if (a === 0) {
      const msg = document.getElementById('alert-msg');
      msg.textContent = 'El coeficiente "a" no puede ser 0 (no sería una ecuación cuadrática).';
      msg.classList.add('visible');
      return;
    }

    const discriminante = (b ** 2) - (4 * a * c);

    if (discriminante < 0) {
      const msg = document.getElementById('alert-msg');
      msg.innerHTML = 'El discriminante es <strong>' + discriminante + '</strong>. La ecuación no tiene soluciones reales (raíces complejas).';
      msg.classList.add('visible');
      return;
    }

    const x1 = (-b - Math.sqrt(discriminante)) / (2 * a);
    const x2 = (-b + Math.sqrt(discriminante)) / (2 * a);

    const x1Final = parseFloat(x1.toFixed(6));
    const x2Final = parseFloat(x2.toFixed(6));

    document.getElementById('val-x1').textContent = x1Final;
    document.getElementById('val-x2').textContent = x2Final;

    const negB = -b;
    document.getElementById('output-msg').innerHTML =
      '<strong>Ecuación:</strong> ' + a + 'x² + (' + b + ')x + (' + c + ') = 0<br>' +
      '<strong>Discriminante:</strong> b² − 4ac = (' + b + ')² − 4(' + a + ')(' + c + ') = ' + discriminante + '<br>' +
      '<strong style="color:#7a60c8">x₁ =</strong> (' + negB + ' − √' + discriminante + ') / (2 × ' + a + ') = <strong style="color:#7a60c8">' + x1Final + '</strong><br>' +
      '<strong style="color:#5aaa7a">x₂ =</strong> (' + negB + ' + √' + discriminante + ') / (2 × ' + a + ') = <strong style="color:#5aaa7a">' + x2Final + '</strong>';

    document.getElementById('result-card').classList.add('visible');
    document.getElementById('result-card').style.animation = 'popIn .4s ease';
  }
</script>
</body>
</html>
