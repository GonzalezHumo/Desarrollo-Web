<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gonzalez Humo-Ejercicio 25</title>
  <style>
    body {
      background-color: #f9f0fb;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      margin: 0;
    }

    h1 {
      color: #9b5da0;
      font-size: 1.4rem;
      font-weight: normal;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    button {
      background-color: #e8b4da;
      color: #6a3d7a;
      border: 2px solid #d89cca;
      border-radius: 10px;
      padding: 10px 28px;
      font-size: 1rem;
      font-family: Georgia, serif;
      cursor: pointer;
      margin-bottom: 30px;
    }

    button:hover {
      background-color: #d89cca;
    }

    #contenedor {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .tabla {
      background-color: #fde8f5;
      border: 2px solid #e8b4da;
      border-radius: 14px;
      padding: 20px 28px;
      min-width: 160px;
      box-shadow: 0 4px 10px rgba(200, 150, 200, 0.2);
    }

    .tabla h2 {
      color: #9b5da0;
      font-size: 1rem;
      margin: 0 0 10px 0;
      text-align: center;
      border-bottom: 1px solid #e8b4da;
      padding-bottom: 6px;
    }

    .tabla p {
      color: #6a3d7a;
      margin: 4px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <h1>Tablas de Multiplicar</h1>
  <button onclick="generarTablas()">Generar Tablas de Multiplicar</button>
  <div id="contenedor"></div>

  <script>
    function generarTablas() {
      const contenedor = document.getElementById("contenedor");
      contenedor.innerHTML = "";

      for (let i = 1; i <= 10; i++) {
        const div = document.createElement("div");
        div.classList.add("tabla");

        const titulo = document.createElement("h2");
        titulo.textContent = "Tabla del " + i;
        div.appendChild(titulo);

        for (let j = 1; j <= 10; j++) {
          const p = document.createElement("p");
          p.textContent = i + " × " + j + " = " + (i * j);
          div.appendChild(p);
        }

        contenedor.appendChild(div);
      }
    }
  </script>

</body>
</html>
